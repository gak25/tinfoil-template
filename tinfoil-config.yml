# Tinfoil Container Configuration
# This file will be auto-populated when you deploy via the Tinfoil dashboard.
# You can also edit it manually - see docs at https://docs.tinfoil.sh/containers/config
#
# After creating this repo from the template:
# 1. Go to https://dash.tinfoil.sh and create a new container
# 2. Provide this repository URL and your container details
# 3. This file will be automatically updated with your deployment settings
#
# For updates: edit this file, commit, and push a new tag (e.g., v2)

cvm-version: 0.7.5
cpus: 2
memory: 8192
gpus: 8

# Container configuration
# Note: image must include SHA256 hash (e.g., image:tag@sha256:abc123...)
containers:
  - name: "app"
    image: "vllm/vllm-openai:v0.19.1-cu130@sha256:2ccff44e7b60ed43093004af99b57ae49855c9d49c411c6707807a49a6eb0e8e"
    runtime: nvidia
    gpus: all
    ipc: host
    env:
      - LOG_LEVEL: "info"
    secrets:
      - API_KEY
    command: ["--port", "8000"]

# Shim configuration (adjust upstream-port and paths to match your container)
shim:
  upstream-port: 8000
  paths:
    - /health
